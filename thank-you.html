<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed — PAVE</title>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@800;900&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<style>
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(ellipse 900px 500px at 50% 0%, rgba(124,58,237,.35), transparent 60%), #0a0712;
    color:#f5f2ff; font-family:'Space Grotesk', sans-serif; text-align:center; padding:24px;
  }
  .box{max-width:480px;}
  .check{
    width:64px; height:64px; margin:0 auto 24px; border-radius:50%;
    background:linear-gradient(135deg, #7c3aed, #4f5bff);
    display:flex; align-items:center; justify-content:center;
  }
  h1{font-family:'Big Shoulders Display', sans-serif; font-weight:900; text-transform:uppercase; font-size:clamp(30px,5vw,44px); margin:0 0 14px;}
  p{color:#b3a8d1; font-size:15px; line-height:1.6; margin-bottom:30px;}
  p.lead{color:#f5f2ff; font-size:18px; font-weight:500; margin-bottom:14px;}
  a.btn{
    display:inline-block; padding:14px 26px; border-radius:999px;
    background:linear-gradient(100deg,#7c3aed,#4f5bff); color:#fff; text-decoration:none;
    font-family:'JetBrains Mono', monospace; font-size:13px; text-transform:uppercase; letter-spacing:.05em;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="check">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>
    </div>
    <h1>Order Confirmed</h1>
    <p class="lead">Welcome to the PAVE lineup™</p>
    <p>Thank you for shopping with PAVE for your hair styling products.</p>
    <p>Your receipt has been emailed to you and your order is on its way to being packed.</p>
    <a class="btn" href="index.html">Back to PAVE</a>
  </div>
  <script>
    // Clear the cart now that checkout is complete.
    try { localStorage.removeItem('pave_cart_v1'); } catch (e) {}
  </script>
</body>
</html>
